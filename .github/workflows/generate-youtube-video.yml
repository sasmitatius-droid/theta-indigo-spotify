name: Auto YouTube Video Generator & Upload Pipeline

on:
  schedule:
    # Mengikuti jadwal podcast (podcast berjalan 07:00 & 19:00 WIB)
    # Video dibuat 30 menit setelah podcast selesai upload audio ke R2
    - cron: '30 0 * * *'   # 07:30 WIB (UTC 00:30) — sesudah podcast pagi
    - cron: '30 12 * * *'  # 19:30 WIB (UTC 12:30) — sesudah podcast sore
  workflow_dispatch:
    inputs:
      article_id:
        description: 'ID Artikel Spesifik (Opsional, kosongkan untuk artikel terbaru)'
        required: false
        default: ''

jobs:
  build-and-upload-video:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 📦 Install Node Dependencies
        run: npm ci || npm install

      - name: 🚀 Run YouTube & Facebook Video Generator Script
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.article_id }}" ]; then
            node scripts/youtube-video-generator.js --article-id=${{ github.event.inputs.article_id }}
          else
            node scripts/youtube-video-generator.js
          fi
