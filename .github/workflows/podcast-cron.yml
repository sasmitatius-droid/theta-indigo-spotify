name: 🎙️ Theta Indigo Podcast Generator

# ──────────────────────────────────────────────────────────────────────────────
# Runs TWICE daily:
#   • 07:00 WIB  →  UTC 00:00
#   • 19:00 WIB  →  UTC 12:00
# Manual trigger available via GitHub Actions UI (workflow_dispatch).
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0 * * *'    # 07:00 WIB  (UTC 00:00)
    - cron: '0 12 * * *'   # 19:00 WIB  (UTC 12:00)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no uploads)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  podcast:
    name: Generate Podcast Episode
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: 📥 Install dependencies
        run: npm ci

      # ── 4. Run podcast generator ──────────────────────────────────────────────
      - name: 🎙️ Generate Podcast Episode
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Running in DRY-RUN mode..."
            npm run podcast:dry
          else
            npm run podcast
          fi
        env:
          # ── Cloudflare R2 (transit audio + RSS feed) ──────────────────────────
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}

          # ── Telegram (sukses / gagal report) ─────────────────────────────────
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

          # ── Firebase Admin (Firestore episode storage) ────────────────────────
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

          # ── Cloudflare D1 (blog article source) ───────────────────────────────
          CLOUDFLARE_ACCOUNT_ID:    ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN:     ${{ secrets.CLOUDFLARE_API_TOKEN }}

          # ── Optional AI keys ──────────────────────────────────────────────────
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # ── 5. Summary ────────────────────────────────────────────────────────────
      - name: 📊 Job Summary
        if: always()
        run: |
          echo "## 🎙️ Podcast Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Time (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Time (WIB) | $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| 📡 RSS Feed | https://pub-3dfac1ebd38a458faff5626cae902ad2.r2.dev/podcast/feed.xml |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔁 Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
